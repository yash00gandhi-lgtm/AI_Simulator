{% extends 'base.html' %}

{% block content %}

<div class="ax-container">

    <!-- 🔥 HEADER -->
    <div class="text-center mb-5 fade-in">
        <h1 class="glow-text">Interview History 📊</h1>
        <p class="text-secondary">Track your past AI interview performances</p>
    </div>

    <!-- 💎 HISTORY LIST -->
    <div id="historyContainer"></div>

</div>

<script>

// 🎯 SCORE COLOR
function getScoreColor(score) {
    if (score >= 75) return "#22c55e";
    if (score >= 50) return "#facc15";
    return "#ef4444";
}

// 🚀 LOAD HISTORY
async function loadHistory() {

    showLoader();

    try {
        const res = await fetch('/api/history/', {
            method: "GET",
            credentials: "include"
        });

        const data = await res.json();

        let html = "";

        if (!data || data.length === 0) {
            html = `<p class="text-center text-secondary">No attempts yet ❌</p>`;
        } else {

            data.forEach((item, index) => {

                const scoreColor = getScoreColor(item.score);

                html += `
                <div class="ax-card mb-4">

                    <!-- HEADER -->
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="glow-text">Attempt ${index + 1}</h5>
                        <span class="text-secondary">Recent</span>
                    </div>

                    <!-- QUESTION -->
                    <p class="mb-2"><b>Q:</b> ${item.question}</p>

                    <!-- SCORE -->
                    <h2 style="color:${scoreColor}; text-shadow:0 0 10px ${scoreColor}">
                        ${item.score}
                    </h2>

                    <!-- FEEDBACK -->
                    <div class="mt-3 p-2" style="background: rgba(250,204,21,0.08); border-radius:10px;">
                        <b>Feedback:</b>
                        <p class="mb-0">${item.feedback || "No feedback"}</p>
                    </div>

                </div>
                `;
            });
        }

        document.getElementById('historyContainer').innerHTML = html;

    } catch (error) {
        console.error("HISTORY ERROR:", error);

        document.getElementById('historyContainer').innerHTML = `
            <p class="text-danger text-center">Error loading history ❌</p>
        `;
    }

    hideLoader();
}

loadHistory();

</script>

{% endblock %}
