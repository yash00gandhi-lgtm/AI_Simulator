{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-center align-items-center" style="height: 90vh;">

    <div class="card p-4 shadow-lg" style="width: 400px; border-radius: 15px;">

        <h3 class="text-center mb-3 text-warning">Create Account 🚀</h3>

        <form id="signupForm">

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" id="username" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>

            <button id="signupBtn" type="submit" class="btn btn-warning w-100">
                Sign Up
            </button>

        </form>

        <p id="error" class="text-danger text-center mt-2"></p>

    </div>

</div>

<script>
document.getElementById("signupForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const btn = document.getElementById("signupBtn");
    btn.innerText = "Creating...";
    btn.disabled = true;

    const username = document.getElementById("username").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
        const res = await fetch("/api/signup/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ username, email, password })
        });

        const data = await res.json();

        if (res.ok) {
            window.location.href = data.redirect;
        } else {
            document.getElementById("error").innerText = data.error || "Signup failed";
        }

    } catch (err) {
        document.getElementById("error").innerText = "Server error";
    }

    btn.innerText = "Sign Up";
    btn.disabled = false;
});
</script>

{% endblock %}
