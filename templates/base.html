<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Interview Simulator</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #020617, #0f172a);
            color: white;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        /* NAVBAR */
        .navbar {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(250, 204, 21, 0.2);
        }

        .navbar-brand {
            font-weight: 600;
            color: #facc15 !important;
            letter-spacing: 1px;
        }

        /* CONTAINER */
        .ax-container {
            max-width: 1100px;
            margin: auto;
        }

        /* CARD */
        .ax-card {
            background: rgba(30, 41, 59, 0.6);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(250, 204, 21, 0.15);
            box-shadow: 0 0 25px rgba(250, 204, 21, 0.05);
            transition: 0.3s;
        }

        .ax-card:hover {
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 0 40px rgba(250, 204, 21, 0.25);
        }

        /* INPUT */
        .ax-input {
            background-color: #020617;
            border: 1px solid rgba(250, 204, 21, 0.2);
            color: white;
            border-radius: 10px;
            padding: 10px;
        }

        .ax-input:focus {
            outline: none;
            border-color: #facc15;
            box-shadow: 0 0 12px rgba(250, 204, 21, 0.6);
        }

        /* BUTTON */
        .ax-btn {
            background: linear-gradient(135deg, #facc15, #eab308);
            border: none;
            color: black;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .ax-btn:hover {
            transform: scale(1.07);
            box-shadow: 0 0 25px rgba(250, 204, 21, 0.7);
        }

        /* TEXT GLOW */
        .glow-text {
            color: #facc15;
            text-shadow: 0 0 12px rgba(250, 204, 21, 0.9);
        }

        /* LOADER */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 6, 23, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            display: none;
        }

        .loader-box {
            text-align: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(250, 204, 21, 0.2);
            border-top: 4px solid #facc15;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* FADE */
        .fade-in {
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

    </style>
</head>

<body>

<!-- 🔥 LOADER -->
<div id="loader">
    <div class="loader-box">
        <div class="spinner"></div>
        <p class="mt-3 glow-text">Processing...</p>
    </div>
</div>

<!-- NAVBAR -->
<nav class="navbar px-4 d-flex justify-content-between">

    <span class="navbar-brand">⚡ AI Interview</span>

    <div>
        <a href="/dashboard/" class="btn btn-sm ax-btn me-2">Dashboard</a>
        <button onclick="logoutUser()" class="btn btn-danger">Logout</button>
    </div>

</nav>

<!-- MAIN -->
<div class="container mt-5 ax-container fade-in">
    {% block content %}
    {% endblock %}
</div>

<!-- JS BASE -->
<script>

function showLoader() {
    document.getElementById("loader").style.display = "flex";
}

function hideLoader() {
    document.getElementById("loader").style.display = "none";
}

async function logoutUser() {
    await fetch("/api/logout/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        }
    });

    window.location.href = "/signup/";  // 🔥 FIX
}

</script>

</body>
</html>
